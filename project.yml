name: Balcony
options:
  bundleIdPrefix: com.balcony
  deploymentTarget:
    macOS: "14.0"
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  BalconyShared:
    path: BalconyShared
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: "2.65.0"
  swift-nio-ssl:
    url: https://github.com/apple/swift-nio-ssl.git
    from: "2.27.0"
  swift-nio-transport-services:
    url: https://github.com/apple/swift-nio-transport-services.git
    from: "1.21.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.10.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.8.1"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  BalconyCLI:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: BalconyCLI/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.balcony.cli
        PRODUCT_NAME: balcony
        SWIFT_VERSION: "5.9"

  BalconyMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: BalconyMac/Sources
      - path: BalconyMac/Resources
        buildPhase: resources
        excludes:
          - "Info.plist"
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.balcony.mac
        INFOPLIST_FILE: BalconyMac/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BalconyMac/Resources/BalconyMac.entitlements
        PRODUCT_NAME: Balcony
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    dependencies:
      - target: BalconyCLI
      - package: BalconyShared
      - product: NIO
        package: swift-nio
      - product: NIOHTTP1
        package: swift-nio
      - product: NIOWebSocket
        package: swift-nio
      - product: NIOSSL
        package: swift-nio-ssl
      - product: NIOTransportServices
        package: swift-nio-transport-services
      - package: Sparkle
      - sdk: IOKit.framework
    postBuildScripts:
      - script: |
          # Copy BalconyCLI binary into app Resources
          CLI_SRC="${BUILT_PRODUCTS_DIR}/balcony"
          CLI_DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/balcony-cli"
          if [ -f "$CLI_SRC" ]; then
            cp "$CLI_SRC" "$CLI_DST"
            chmod +x "$CLI_DST"
          fi

          # Copy hook-handler script into app Resources
          HOOK_SRC="${SRCROOT}/Scripts/hook-handler"
          HOOK_DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/hook-handler"
          if [ -f "$HOOK_SRC" ]; then
            cp "$HOOK_SRC" "$HOOK_DST"
            chmod +x "$HOOK_DST"
          fi
        name: "Embed BalconyCLI and hook-handler"

  BalconyiOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BalconyiOS/Sources
      - path: BalconyiOS/Resources
        buildPhase: resources
        excludes:
          - "Info.plist"
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.balcony.ios
        INFOPLIST_FILE: BalconyiOS/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BalconyiOS/Resources/BalconyiOS.entitlements
        PRODUCT_NAME: Balcony
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: 1
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
    dependencies:
      - package: BalconyShared
      - package: SwiftTerm
      - sdk: AVFoundation.framework
      - sdk: CoreBluetooth.framework

  BalconySharedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BalconyShared/Tests/BalconySharedTests
    dependencies:
      - package: BalconyShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.balcony.shared.tests

