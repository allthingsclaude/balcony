name: Release iOS

on:
  push:
    tags: ["v*"]

env:
  APP_NAME: Balcony
  SCHEME: BalconyiOS

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # ── Extract version from tag ──────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version tag format '$TAG'. Expected X.Y.Z"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          BUILD=$(git rev-list --count HEAD)
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG (build $BUILD)"

      # ── Set up signing keychain ───────────────────────────────────────
      - name: Set up keychain
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PWD: ${{ secrets.IOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$IOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      # ── Install App Store Connect API Key ──────────────────────────────
      - name: Install API key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY" > ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      # ── Install xcodegen and generate project ─────────────────────────
      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      # ── Archive ───────────────────────────────────────────────────────
      - name: Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
        run: |
          xcodebuild archive \
            -project Balcony.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/$APP_NAME-iOS.xcarchive" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── Export IPA ────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME-iOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-ios" \
            -exportOptionsPlist exportOptions-ios.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}"

      # ── Upload to App Store Connect ───────────────────────────────────
      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          IPA=$(find "$RUNNER_TEMP/export-ios" -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"

      # ── Cleanup secrets ──────────────────────────────────────────────
      - name: Cleanup secrets
        if: always()
        run: |
          rm -rf ~/.private_keys 2>/dev/null || true
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
